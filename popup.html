<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  body {
    width: 220px;
    padding: 14px 16px;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 13px;
    color: #333;
    margin: 0;
  }
  h3 {
    margin: 0 0 12px;
    font-size: 14px;
    font-weight: 600;
  }
  .option {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }
  .option label {
    cursor: pointer;
    user-select: none;
  }
  .toggle {
    position: relative;
    width: 36px;
    height: 20px;
    flex-shrink: 0;
    margin-inline-start: 12px;
  }
  .toggle input {
    opacity: 0;
    width: 0;
    height: 0;
  }
  .toggle .slider {
    position: absolute;
    inset: 0;
    background: #ccc;
    border-radius: 20px;
    cursor: pointer;
    transition: background 0.2s;
  }
  .toggle .slider::before {
    content: "";
    position: absolute;
    left: 2px;
    top: 2px;
    width: 16px;
    height: 16px;
    background: #fff;
    border-radius: 50%;
    transition: transform 0.2s;
  }
  .toggle input:checked + .slider {
    background: #4285f4;
  }
  .toggle input:checked + .slider::before {
    transform: translateX(16px);
  }
  [dir="rtl"] .toggle input:checked + .slider::before {
    transform: translateX(-16px);
  }
</style>
</head>
<body>
  <h3 data-i18n="popupTitle">Reverse AutoScroll</h3>
  <div class="option">
    <label for="reverseY" data-i18n="reverseVertical">Reverse Vertical</label>
    <label class="toggle">
      <input type="checkbox" id="reverseY">
      <span class="slider"></span>
    </label>
  </div>
  <div class="option">
    <label for="reverseX" data-i18n="reverseHorizontal">Reverse Horizontal</label>
    <label class="toggle">
      <input type="checkbox" id="reverseX">
      <span class="slider"></span>
    </label>
  </div>
  <script src="popup.js"></script>
</body>
</html>
